<header>

        <nav class="navbar">

<div id="menu">
    <ul>
        <li><a href="/palamedia/index.html"><button class="selectButton">HEM</button></a></li>
        <li><a href="/palamedia/portfolio/index.html"><button class="selectButton">PORTFOLIO</button></a></li>
        <li><a href="/palamedia/omoss/index.html"><button class="selectButton">OM OSS</button></a></li>

        <li><div id="svoren"><a id="underline" href="/palamedia/index.html">SV</a><a> / </a><a href="/eng/home/index.html">EN</a></div></li>
    </ul>
</div>

<div id="content">
        <img src="/palamedia/portfolio/portfoliobilder/1.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/1.JPG">
        <img src="/palamedia/portfolio/portfoliobilder/2.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/2.png">
        <img src="/palamedia/portfolio/portfoliobilder/3.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/3.png">
        <img src="/palamedia/portfolio/portfoliobilder/4.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/4.png">
        <img src="/palamedia/portfolio/portfoliobilder/5.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/5.png">
        <img src="/palamedia/portfolio/portfoliobilder/6.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/6.JPG">
        <img src="/palamedia/portfolio/portfoliobilder/7.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/7.png">
        <img src="/palamedia/portfolio/portfoliobilder/8.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/8.JPG">
        <img src="/palamedia/portfolio/portfoliobilder/9.JPG" data-fullsize="/palamedia/portfolio/portfoliobilder(stora)/9.JPG">
</div>

<div id="lightbox">
    <img id="lightboxImg">
</div>

<script>
const menuButton = document.getElementById('menuButton');
menuButton.onclick = function() {
    if (menu.style.display === 'block') {
        menu.style.display = 'none';
    } else {
        menu.style.display = 'block';
    }
    document.body.classList.toggle('menuOpen');
}
if (location.hostname !== "bedfights.github.io") {
    document.querySelectorAll("a").forEach(a => {
        a.href = a.href.replace("/palamedia/", "/");
    });
    document.querySelectorAll("img").forEach(img => {
        img.src = img.src.replace("/palamedia/", "/");
        if (img.dataset.fullsize) {
            img.dataset.fullsize = img.dataset.fullsize.replace("/palamedia/", "/");
        }
    });
}
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

document.querySelectorAll('#content img').forEach(img => {
    img.onclick = function() {
    lightbox.classList.add('active');
    lightboxImg.src = img.dataset.fullsize;
}
});
lightbox.onclick = function() {
    lightbox.classList.remove('active');
}
console.log(location.hostname + "hostname");
</script>
</body>
</html>
